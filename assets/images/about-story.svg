    <circle cx="310" cy="460" r="10" fill="#0A1628" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
    <circle cx="310" cy="460" r="4" fill="url(#gold)" opacity="0.8"/>
    <text x="310" y="490" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#D4AF37" text-anchor="middle" opacity="0.7" font-weight="500">Fondation</text>

    <circle cx="460" cy="460" r="10" fill="#0A1628" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
