    <text x="50" y="520" font-family="monospace" font-size="12" fill="#3B82F6" opacity="0.08">&lt;/&gt;</text>
    <text x="720" y="380" font-family="monospace" font-size="10" fill="#D4AF37" opacity="0.08">01101</text>

    <text x="400" y="565" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="4" fill="#D4AF37" text-anchor="middle" opacity="0.2">CORTEX STUDIO</text>
