    <circle cx="150" cy="120" r="200" fill="url(#goldFade)" opacity="0.5"/>
    <circle cx="650" cy="480" r="180" fill="url(#goldFade)" opacity="0.3"/>
    <circle cx="700" cy="150" r="150" fill="#3B82F6" opacity="0.03"/>

    <line x1="80" y1="80" x2="200" y2="150" stroke="#D4AF37" stroke-width="0.5" opacity="0.08"/>
